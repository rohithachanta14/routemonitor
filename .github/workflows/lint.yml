name: Lint

on:
  push:
    branches: [main, develop, "phase-*"]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: black (formatting)
        run: black --check api/ core/ tasks/ dashboard/ tests/ scripts/

      - name: isort (import order)
        run: isort --profile black --check-only api/ core/ tasks/ dashboard/ tests/ scripts/

      - name: flake8 (style)
        run: flake8 api/ core/ tasks/ --max-line-length=100

      - name: mypy (types)
        run: mypy api/ core/ tasks/ --ignore-missing-imports
